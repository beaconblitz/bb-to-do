<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beaconblitz TodoQuest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#10151f;
    --surface:#1b2240;
    --surface-2:#26315d;
    --primary:#22d3ee;
    --primary-dark:#2563eb;
    --primary-light:#15375d;
    --gold:#facc15;
    --gold-light:#4d3512;
    --success:#34d399;
    --success-light:#133c2f;
    --danger:#fb7185;
    --danger-light:#4a1828;
    --text:#fffaff;
    --muted:#c5d0e6;
    --border:#4b5b93;
    --radius:8px;
    --bronze:#d98443;
    --silver:#bec7d2;
    --diamond:#59d8ff;
    --xp:#a3e635;
    --pink:#ec4899;
    --violet:#8b5cf6;
    --orange:#fb923c;
    --clay:#ffe1ef;
    --clay-2:#c7f0ff;
    --clay-3:#fff0a8;
    --clay-border:rgba(255,255,255,.74);
    --clay-shadow:10px 14px 0 rgba(103,80,164,.16),0 22px 44px rgba(34,28,74,.22),inset 0 -8px 18px rgba(91,65,127,.1),inset 0 8px 18px rgba(255,255,255,.46);
    --shadow:0 18px 40px rgba(0,0,0,.34);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:
      linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px),
      radial-gradient(circle at 12% 18%, rgba(236,72,153,.28) 0%, transparent 26%),
      radial-gradient(circle at 82% 14%, rgba(34,211,238,.24) 0%, transparent 30%),
      radial-gradient(circle at 48% 88%, rgba(250,204,21,.2) 0%, transparent 30%),
      linear-gradient(135deg,#121832 0%,#2d1b69 34%,#0f766e 68%,#451a03 100%);
    background-size:44px 44px,44px 44px,100% 100%,100% 100%,100% 100%,100% 100%;
    background-attachment:fixed;
    min-height:100vh;
    color:var(--text);
    isolation:isolate;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    display:none;
  }
  h1,h2,h3,.brand{font-family:'Sora',sans-serif;}
  .app{max-width:1060px;margin:0 auto;padding:24px 18px 60px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .brand{font-size:22px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:9px;text-shadow:0 3px 0 rgba(0,0,0,.18);}
  .brand .dot{width:16px;height:16px;border-radius:4px;background:linear-gradient(135deg,var(--gold),var(--pink),var(--primary));display:inline-block;box-shadow:0 0 18px rgba(34,211,238,.65);animation:spinGem 4s linear infinite;}
  @keyframes spinGem{to{transform:rotate(360deg);}}
  .btn{
    font-family:'Inter',sans-serif;font-weight:600;font-size:14px;
    border:1.5px solid rgba(255,255,255,.12);border-radius:8px;padding:11px 18px;cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
    text-transform:uppercase;letter-spacing:.02em;
  }
  .btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.6);transform:none;box-shadow:none;}
  .btn-primary{background:linear-gradient(90deg,var(--primary),var(--violet),var(--pink),var(--orange));background-size:100% 100%;color:#06121d;box-shadow:0 5px 0 #075985,0 12px 24px rgba(56,189,248,.22);}
  .btn-primary:hover{filter:brightness(1.06);}
  .btn-ghost{background:rgba(255,255,255,.05);color:var(--text);border:1.5px solid var(--border);}
  .btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
  .btn-success{background:linear-gradient(180deg,#5df0af,#16a36f);color:#061b12;box-shadow:0 4px 0 #08734b;}
  .btn-danger{background:transparent;color:var(--danger);}
  .btn-sm{padding:7px 12px;font-size:12.5px;}
  .btn-block{width:100%;}
  input,textarea,select{
    font-family:'Inter',sans-serif;font-size:14px;
    border:1.5px solid var(--border);border-radius:8px;padding:11px 13px;
    width:100%;background:#111927;color:var(--text);outline:none;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--primary);}
  label{font-size:12.5px;font-weight:700;color:var(--gold);display:block;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.04em;}
  .card{background:linear-gradient(180deg,rgba(38,49,93,.95),rgba(27,34,64,.96));border-radius:var(--radius);border:1px solid var(--border);padding:22px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .card::before{
    content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;
    background:linear-gradient(120deg,var(--primary),var(--gold),var(--pink),var(--violet));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
  }
  .hidden{display:none !important;}
  .center-screen{min-height:80vh;display:flex;align-items:center;justify-content:center;}
  .setup-box{max-width:480px;width:100%;}
  .setup-box p{color:var(--muted);font-size:13.5px;line-height:1.5;margin-bottom:4px;}
  .staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;margin-top:18px;}
  .staff-tile{
    background:linear-gradient(160deg,rgba(34,211,238,.2),rgba(139,92,246,.18),rgba(236,72,153,.16));border:1.5px solid var(--border);border-radius:8px;
    padding:18px 10px;text-align:center;cursor:pointer;transition:.15s;
    box-shadow:0 8px 0 rgba(0,0,0,.18);
  }
  .staff-tile:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 11px 0 rgba(0,0,0,.18),0 0 24px rgba(56,189,248,.16);}
  .avatar{
    width:56px;height:56px;border-radius:8px;margin:0 auto 10px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Sora',sans-serif;font-weight:700;font-size:19px;color:#fff;
  }
  .staff-tile .name{font-weight:600;font-size:13.5px;}
  .staff-tile .coins{font-size:11.5px;color:var(--gold);font-weight:700;margin-top:4px;}
  .login-header{text-align:center;margin-bottom:6px;}
  .login-header h1{font-size:32px;color:var(--text);text-shadow:0 4px 0 rgba(0,0,0,.25);}
  .login-header p{color:var(--muted);font-size:13.5px;margin-top:4px;}
  .admin-link{text-align:center;margin-top:22px;}
  .admin-link a{color:var(--muted);font-size:12.5px;text-decoration:underline;cursor:pointer;}

  /* dashboard header */
  .dash-header{
    background:
      linear-gradient(120deg,rgba(34,211,238,.32),rgba(139,92,246,.24),rgba(236,72,153,.2),rgba(250,204,21,.16)),
      linear-gradient(180deg,#2d3566 0%,#171f40 100%);
    background-size:100% 100%,auto;
    border:1px solid #40516b;
    border-radius:8px;padding:24px;color:#fff;margin-bottom:20px;
    position:relative;overflow:hidden;
    box-shadow:var(--shadow), inset 0 0 0 1px rgba(255,255,255,.04);
  }
  .dash-header::after{
    content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;
    background:conic-gradient(from 0deg,rgba(250,204,21,.26),rgba(236,72,153,.16),rgba(34,211,238,.2),rgba(250,204,21,.26));
    transform:rotate(12deg);
  }
  .dash-header .row1{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1;}
  .dash-header h2{font-size:20px;}
  .dash-header .role-tag{font-size:11px;background:rgba(163,230,53,.16);border:1px solid rgba(163,230,53,.34);color:#d9ff99;padding:4px 10px;border-radius:6px;margin-top:6px;display:inline-block;text-transform:uppercase;font-weight:800;}
  .coin-pill{
    background:rgba(0,0,0,.24);border:1px solid rgba(248,194,78,.4);border-radius:8px;padding:10px 16px;
    display:flex;align-items:center;gap:8px;font-family:'Sora',sans-serif;font-weight:700;font-size:18px;
  }
  .coin-pill.bump{animation:bump .4s ease;}
  @keyframes bump{0%{transform:scale(1);}40%{transform:scale(1.18);}100%{transform:scale(1);}}
  .coin-icon{width:22px;height:22px;flex-shrink:0;}

  .trophy-shelf{display:flex;gap:10px;margin-top:18px;position:relative;z-index:1;}
  .trophy-slot{
    flex:1;background:rgba(0,0,0,.18);border-radius:8px;padding:10px 6px;text-align:center;
    border:1.5px dashed rgba(255,255,255,.25);
  }
  .trophy-slot.unlocked{background:rgba(255,255,255,.18);border-style:solid;border-color:rgba(255,255,255,.4);}
  .trophy-slot svg{width:26px;height:26px;}
  .trophy-slot .tlabel{font-size:9.5px;margin-top:4px;opacity:.85;font-weight:600;letter-spacing:.03em;}
  .progress-wrap{margin-top:14px;position:relative;z-index:1;}
  .progress-bar{height:12px;background:rgba(0,0,0,.28);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.12);}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--xp),var(--gold));border-radius:3px;transition:width .4s ease;}
  .progress-label{font-size:11px;margin-top:6px;opacity:.85;}

  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .tab{
    padding:10px 16px;border-radius:8px;font-size:13.5px;font-weight:800;cursor:pointer;
    background:rgba(255,255,255,.05);border:1.5px solid var(--border);color:var(--muted);
    text-transform:uppercase;
  }
  .tab.active{background:linear-gradient(180deg,#55d4ff,var(--primary-dark));color:#06121d;border-color:#7ddfff;box-shadow:0 4px 0 #075985;}

  .section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 10px;}
  .section-title:first-child{margin-top:0;}
  .bento-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;align-items:stretch;}
  .bento-tile{
    min-width:0;background:linear-gradient(145deg,rgba(255,255,255,.1),rgba(255,255,255,.035));
    border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:18px;box-shadow:0 10px 0 rgba(0,0,0,.12);
    position:relative;overflow:hidden;
  }
  .bento-tile::after{
    content:"";position:absolute;inset:auto -32px -42px auto;width:120px;height:120px;
    background:radial-gradient(circle,rgba(255,255,255,.12),transparent 66%);pointer-events:none;
  }
  .bento-hero{grid-column:span 8;grid-row:span 2;}
  .bento-stat{grid-column:span 4;display:flex;flex-direction:column;justify-content:space-between;gap:12px;}
  .bento-main{grid-column:span 7;}
  .bento-side{grid-column:span 5;}
  .bento-full{grid-column:1/-1;}
  .bento-label{font-size:11px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;}
  .bento-value{font-family:'Sora',sans-serif;font-size:30px;font-weight:800;line-height:1;margin-top:7px;}
  .bento-note{color:var(--muted);font-size:13px;line-height:1.45;margin-top:7px;}
  .bento-tile .section-title{margin-top:0;}
  .bento-grid + .tabs{margin-top:18px;}
  .task-stack{display:grid;gap:10px;}
  .task-stack .task-card{margin-bottom:0;}

  .task-card{
    background:linear-gradient(145deg,rgba(34,211,238,.13),rgba(139,92,246,.15),rgba(236,72,153,.1),rgba(27,34,64,.96));border:1px solid var(--border);border-radius:8px;
    padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start;
    box-shadow:0 8px 0 rgba(0,0,0,.14);
  }
  .task-card.completed{opacity:.65;}
  .task-card.overdue{border-left:4px solid var(--danger);}
  .task-card.upcoming{border-left:4px solid var(--gold);}
  .task-title{font-weight:600;font-size:14.5px;}
  .task-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .chip{font-size:11px;padding:4px 9px;border-radius:6px;font-weight:800;text-transform:uppercase;}
  .chip-deadline{background:var(--primary-light);color:#bdefff;}
  .chip-overdue{background:var(--danger-light);color:var(--danger);}
  .chip-source{background:#263346;color:var(--muted);}
  .chip-reward{background:var(--gold-light);color:#ffe09a;}
  .chip-late{background:#263346;color:var(--muted);}
  .task-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
  .empty-state .big{font-size:32px;margin-bottom:8px;}
  .charm-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;margin-top:8px;min-height:76px;}
  .charm-row.compact{gap:5px;min-height:42px;margin-top:0;}
  .charm-badge{
    width:42px;height:72px;padding-top:34px;position:relative;
    display:inline-flex;align-items:flex-start;justify-content:center;
    transform-origin:50% 2px;
    animation:charmSwing 3.8s ease-in-out infinite;
    animation-delay:calc(var(--i, 0) * -.42s);
    filter:drop-shadow(0 10px 10px rgba(0,0,0,.24));
  }
  .charm-row.compact .charm-badge{width:26px;height:40px;padding-top:18px;animation-duration:4.6s;}
  .charm-badge::before{
    content:"";position:absolute;left:50%;top:2px;width:2px;height:38px;border-radius:999px;
    background:linear-gradient(180deg,var(--gold),var(--pink),var(--primary));
    transform:translateX(-50%) rotate(calc((var(--i, 0) - 2) * 3deg));
    box-shadow:0 0 10px rgba(255,255,255,.18);
  }
  .charm-row.compact .charm-badge::before{height:22px;width:1px;}
  .charm-badge::after{
    content:"";position:absolute;left:50%;top:3px;width:8px;height:8px;border-radius:50%;
    background:radial-gradient(circle at 32% 30%,#fff,var(--primary) 35%,var(--violet) 72%);
    border:1px solid rgba(255,255,255,.38);
    transform:translateX(-50%);
    box-shadow:0 0 12px var(--primary);
  }
  .charm-row.compact .charm-badge::after{width:5px;height:5px;}
  .charm-gem{
    width:34px;height:34px;border-radius:10px;
    display:inline-flex;align-items:center;justify-content:center;
    background:
      radial-gradient(circle at 32% 24%,rgba(255,255,255,.86),rgba(255,255,255,.12) 18%,transparent 35%),
      linear-gradient(150deg,rgba(255,255,255,.22),rgba(255,255,255,.05)),
      linear-gradient(135deg,var(--surface-2),var(--primary-light));
    border:1px solid rgba(255,255,255,.32);
    box-shadow:inset 0 -7px 12px rgba(0,0,0,.22),0 0 18px color-mix(in srgb,var(--primary) 60%,transparent);
    font-size:18px;font-weight:800;
  }
  .charm-row.compact .charm-gem{width:22px;height:22px;border-radius:7px;font-size:12px;}
  .charm-badge:nth-child(2n) .charm-gem{border-radius:50% 50% 12px 12px;}
  .charm-badge:nth-child(3n) .charm-gem{border-radius:12px 12px 50% 50%;}
  .charm-badge:nth-child(4n) .charm-gem{transform:rotate(45deg);}
  .charm-badge:nth-child(4n) .charm-gem span{transform:rotate(-45deg);}
  @keyframes charmSwing{
    0%,100%{transform:rotate(-5deg) translateY(0);}
    50%{transform:rotate(6deg) translateY(2px);}
  }
  .charm-badge.locked{opacity:.34;filter:grayscale(1);}
  .shop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;}
  .shop-card{
    background:linear-gradient(145deg,rgba(250,204,21,.13),rgba(34,211,238,.13),rgba(236,72,153,.12));
    border:1px solid var(--border);border-radius:8px;padding:16px;position:relative;overflow:hidden;
    box-shadow:0 8px 0 rgba(0,0,0,.14);
  }
  .shop-icon{font-size:34px;margin-bottom:8px;text-shadow:0 0 18px rgba(255,255,255,.28);}
  .shop-name{font-family:'Sora',sans-serif;font-weight:800;font-size:15px;}
  .shop-cost{color:var(--gold);font-weight:800;font-size:12px;margin:7px 0 12px;text-transform:uppercase;}
  .shop-owned{color:var(--success);font-weight:800;font-size:12px;text-transform:uppercase;}
  body[data-theme="neon"]{--primary:#22d3ee;--primary-dark:#2563eb;--gold:#facc15;--surface:#172554;--surface-2:#312e81;--border:#67e8f9;}
  body[data-theme="candy"]{--primary:#f472b6;--primary-dark:#db2777;--gold:#fde047;--surface:#3b1746;--surface-2:#5b214f;--border:#f9a8d4;}
  body[data-theme="forest"]{--primary:#34d399;--primary-dark:#059669;--gold:#bef264;--surface:#163326;--surface-2:#214834;--border:#86efac;}
  body[data-theme="sunset"]{--primary:#fb923c;--primary-dark:#ea580c;--gold:#fde047;--surface:#3b1d2e;--surface-2:#5f2442;--border:#fdba74;}
  body[data-theme="royal"]{--primary:#a78bfa;--primary-dark:#7c3aed;--gold:#facc15;--surface:#231942;--surface-2:#372768;--border:#c4b5fd;}
  body[data-theme="ocean"]{--primary:#38bdf8;--primary-dark:#0284c7;--gold:#67e8f9;--surface:#0f2b46;--surface-2:#164e63;--border:#7dd3fc;}
  body[data-theme="default"]{
    --page-bg:
      linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px),
      radial-gradient(circle at 12% 18%, rgba(236,72,153,.28) 0%, transparent 26%),
      radial-gradient(circle at 82% 14%, rgba(34,211,238,.24) 0%, transparent 30%),
      radial-gradient(circle at 48% 88%, rgba(250,204,21,.2) 0%, transparent 30%),
      linear-gradient(135deg,#121832 0%,#2d1b69 34%,#0f766e 68%,#451a03 100%);
    --page-bg-size:44px 44px,44px 44px,100% 100%,100% 100%,100% 100%,100% 100%;
    --card-bg:linear-gradient(180deg,rgba(38,49,93,.95),rgba(27,34,64,.96));
    --dash-bg:linear-gradient(120deg,rgba(34,211,238,.32),rgba(139,92,246,.24),rgba(236,72,153,.2),rgba(250,204,21,.16)),linear-gradient(180deg,#2d3566 0%,#171f40 100%);
    --task-bg:linear-gradient(145deg,rgba(34,211,238,.13),rgba(139,92,246,.15),rgba(236,72,153,.1),rgba(27,34,64,.96));
    --shop-bg:linear-gradient(145deg,rgba(250,204,21,.13),rgba(34,211,238,.13),rgba(236,72,153,.12));
    --field-bg:#111927;
    --button-bg:linear-gradient(90deg,var(--primary),var(--violet),var(--pink),var(--orange));
    --active-tab-bg:linear-gradient(180deg,#55d4ff,var(--primary-dark));
    --button-text:#06121d;
  }
  body{background:var(--page-bg);background-size:var(--page-bg-size);}
  .card{background:var(--card-bg);}
  .dash-header{background:var(--dash-bg);background-size:100% 100%,auto;border-color:var(--border);}
  .task-card{background:var(--task-bg);}
  .shop-card{background:var(--shop-bg);}
  .modal{background:var(--card-bg);}
  input,textarea,select{background:var(--field-bg);}
  .btn-primary{background:var(--button-bg);background-size:100% 100%;color:var(--button-text);}
  .tab.active{background:var(--active-tab-bg);color:var(--button-text);border-color:var(--primary);}

  body[data-theme="neon"]{
    --bg:#04111f;--surface:#071827;--surface-2:#0b2440;--primary:#00f5ff;--primary-dark:#0ea5e9;--primary-light:#06384a;--gold:#f8ff6b;--gold-light:#34390a;--success:#39ff88;--success-light:#063820;--danger:#ff4d8d;--danger-light:#461021;--text:#f4fdff;--muted:#a5f3fc;--border:#22d3ee;--xp:#baff29;--pink:#ff3df2;--violet:#8b5cf6;--orange:#ffb020;
    --page-bg:linear-gradient(rgba(0,245,255,.08) 1px, transparent 1px),linear-gradient(90deg,rgba(255,61,242,.07) 1px,transparent 1px),radial-gradient(circle at 16% 18%,rgba(0,245,255,.34),transparent 28%),radial-gradient(circle at 82% 24%,rgba(255,61,242,.28),transparent 30%),linear-gradient(135deg,#020617 0%,#071827 36%,#172554 68%,#2e1065 100%);
    --page-bg-size:38px 38px,38px 38px,100% 100%,100% 100%,100% 100%;
    --card-bg:linear-gradient(180deg,rgba(8,47,73,.96),rgba(8,13,35,.98));
    --dash-bg:linear-gradient(120deg,rgba(0,245,255,.38),rgba(139,92,246,.3),rgba(255,61,242,.25)),linear-gradient(180deg,#0f2a55,#050816);
    --task-bg:linear-gradient(145deg,rgba(0,245,255,.18),rgba(139,92,246,.17),rgba(255,61,242,.11),rgba(5,8,22,.96));
    --shop-bg:linear-gradient(145deg,rgba(0,245,255,.18),rgba(248,255,107,.14),rgba(255,61,242,.14));
    --field-bg:#020617;--button-bg:linear-gradient(90deg,#00f5ff,#8b5cf6,#ff3df2);--active-tab-bg:linear-gradient(180deg,#67e8f9,#2563eb);

<body>

<div id="app" class="app"></div>

<script>

/* ============ FIREBASE SETUP ============ */
function initFirebase(config){
  try{
    if(!firebase.apps.length){ firebase.initializeApp(config); }
    db = firebase.database();
    localStorage.setItem('bb_todoquest_config', JSON.stringify(config));
    listenData();
    renderLogin();
  }catch(e){
    alert('Firebase config aayi bandhippikan pattiyilla: ' + e.message);
  }
}

function listenData(){
  db.ref('todoQuest/staff').on('value', snap => {
    staffCache = snap.val() || {};
    rerender();
  });
  db.ref('todoQuest/tasks').on('value', snap => {
    taskCache = snap.val() || {};
    rerender();
  });
}

function rerender(){
  if(!currentUser){ renderLogin(); }
  else if(currentUser.isAdmin){ renderAdmin(); }
  else { renderStaffDash(); }
}

/* ============ HELPERS ============ */
function avatarColor(name){
  const colors = ['#4C3AE3','#F5A623','#16A34A','#E23744','#0EA5E9','#A855F7','#EA580C'];
  let h=0; for(const c of (name||'')) h+=c.charCodeAt(0);
  return colors[h % colors.length];
}
function initials(name){ return (name||'?').trim().split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function fmtDate(ts){
  if(!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}) + ', ' + d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}
function todayDateTimeInput(ts=Date.now()){
  const d = new Date(ts || Date.now());
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function parseQuestTitles(raw){
  return raw.split('\n').map(t => t.trim()).filter(Boolean);
}
function escapeAttr(value){
  return String(value ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function ownedCharmKeys(staff){
  const charms = staff?.charms || {};
  if(Array.isArray(charms)) return charms;
  return Object.keys(charms).filter(k => charms[k]);
}
function ownedThemeKeys(staff){
  const themes = staff?.themes || {};
  if(Array.isArray(themes)) return themes;
  return Object.keys(themes).filter(k => themes[k]);
}
function themesEnabled(staff){
  return staff?.themeEnabled !== false;
}
function activeTheme(staff){
  if(!themesEnabled(staff)) return null;
  return THEME_SHOP.find(t => t.key === staff?.activeTheme);
}
function renderThemeName(staff){
  const theme = activeTheme(staff);
  if(!themesEnabled(staff)) return 'Theme Off';
  return theme ? `${theme.icon} ${theme.name}` : 'Default';
}
function applyActiveTheme(staff){
  document.body.dataset.theme = activeTheme(staff)?.key || 'default';
  applyActiveStyle(staff);
}
function ownedStyleKeys(staff){
  const styles = staff?.styles || {};
  const owned = Array.isArray(styles) ? styles.slice() : Object.keys(styles).filter(k => styles[k]);
  if(!owned.includes('clay')) owned.push('clay');
  return owned;
}
function activeStyleKey(staff){
  return staff?.activeStyle || 'clay';
}
function renderStyleName(staff){
  const style = STYLE_SHOP.find(s => s.key === activeStyleKey(staff));
  return style ? `${style.icon} ${style.name}` : '🧁 Claymorphism';
}
function applyActiveStyle(staff){
  document.body.dataset.style = activeStyleKey(staff);
}
function renderCharms(staff, compact=false){
  const owned = ownedCharmKeys(staff);
  if(!owned.length) return compact ? `<span style="color:var(--muted);font-size:12px;">No charms</span>` : `<div class="charm-row"><span style="color:var(--muted);font-size:12px;">No charms yet</span></div>`;
  return `<div class="charm-row ${compact?'compact':''}">${owned.map((key,i)=>{
    const charm = CHARM_SHOP.find(c=>c.key===key);
    if(!charm) return '';
    return `<span class="charm-badge" title="${charm.name}" style="--i:${i};"><span class="charm-gem"><span>${charm.icon}</span></span></span>`;
  }).join('')}</div>`;
}
function myTasks(staffId){
  return Object.entries(taskCache).filter(([id,t])=>t.staffId===staffId).map(([id,t])=>({id,...t}));
}
function toast(msg){
  const el = document.createElement('div');
  el.className='toast'; el.innerHTML = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}
function trophyCountFor(staff){
  return TROPHIES.filter(t => (staff.onTimeCount||0) >= t.threshold).length;
}
function nextTrophy(staff){
  return TROPHIES.find(t => (staff.onTimeCount||0) < t.threshold);
}

function renderTaskLists(pending, completed, now){
  const overdue = pending.filter(t=>t.deadline && t.deadline < now);
  const upcoming = pending.filter(t=>!t.deadline || t.deadline >= now);

  function taskRow(t){
    const isOverdue = t.status!=='completed' && t.deadline && t.deadline < now;
    const cardClass = t.status==='completed' ? 'completed' : (isOverdue ? 'overdue' : 'upcoming');
    return `
    <div class="task-card ${cardClass}">
      <div>
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          ${t.deadline ? `<span class="chip ${isOverdue?'chip-overdue':'chip-deadline'}">⏰ ${fmtDate(t.deadline)}</span>` : `<span class="chip chip-deadline">No deadline</span>`}

          ${t.status==='completed' ? `<span class="chip chip-reward">✨ +${SCORE_PER_TASK} pts</span>` : ''}
          ${t.status==='completed' ? (t.onTime ? `<span class="chip chip-reward">🏆 +${COINS_PER_TASK} coins</span>` : `<span class="chip chip-late">Completed late — no coin reward</span>`) : ''}
        </div>
      </div>
      ${t.status!=='completed' ? `<div class="task-actions">
        <button class="btn btn-ghost btn-sm" onclick="editTask('${t.id}')">Edit</button>
        <button class="btn btn-success btn-sm" onclick="completeTask('${t.id}')">✓ Complete</button>
      </div>` : ''}
    </div>`;
  }

  return `

    </div>

    </div>
    <div class="section-title">Themes</div>
    <div class="card" style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;">
        <div>
          <h3>Theme ${themeIsOn ? 'On' : 'Off'}</h3>

        </div>
        <button class="btn ${themeIsOn ? 'btn-ghost' : 'btn-primary'} btn-sm" onclick="toggleThemeMode(${themeIsOn ? 'false' : 'true'})">${themeIsOn ? 'Turn Off' : 'Turn On'}</button>
      </div>
    </div>
    <div class="shop-grid">
      ${THEME_SHOP.map(theme=>{
        const hasTheme = ownedThemes.includes(theme.key);
        const isActive = themeIsOn && staff.activeTheme === theme.key;
        const canBuy = (staff.coins||0) >= theme.cost && !hasTheme;

          <div class="shop-card">
            <div class="shop-icon">${theme.icon}</div>
            <div class="shop-name">${theme.name}</div>
            <div class="shop-cost">🪙 ${theme.cost} coins</div>

      ${STYLE_SHOP.map(style=>{

          <div class="shop-card">
            <div class="shop-icon">${style.icon}</div>
            <div class="shop-name">${style.name}</div>
            <div class="shop-cost">${style.cost ? `🪙 ${style.cost} coins` : 'Free'}</div>

              ? `<div class="shop-owned">Applied</div>`
              : hasStyle

function buyCharm(charmKey){
  const charm = CHARM_SHOP.find(c=>c.key===charmKey);
  if(!charm || !currentUser || currentUser.isAdmin) return;
  const staffRef = db.ref('todoQuest/staff/'+currentUser.id);
  staffRef.transaction(staff=>{
    if(!staff) return;
    staff.charms = staff.charms || {};
    if(staff.charms[charm.key]) return;
    if((staff.coins||0) < charm.cost) return;
    staff.coins = (staff.coins||0) - charm.cost;
    staff.charms[charm.key] = true;
    return staff;
  }).then(result=>{
    if(result.committed){
      toast(`${charm.icon} ${charm.name} purchased!`);
      activeTab='shop';
    } else {
      toast('Coins mathi alla or already owned');
    }
  });
}

function buyTheme(themeKey){
  const theme = THEME_SHOP.find(t=>t.key===themeKey);
  if(!theme || !currentUser || currentUser.isAdmin) return;
  const staffRef = db.ref('todoQuest/staff/'+currentUser.id);
  staffRef.transaction(staff=>{
    if(!staff) return;
    staff.themes = staff.themes || {};
    if(staff.themes[theme.key]) return;
    if((staff.coins||0) < theme.cost) return;
    staff.coins = (staff.coins||0) - theme.cost;
    staff.themes[theme.key] = true;
    staff.activeTheme = theme.key;
    staff.themeEnabled = true;
    return staff;
  }).then(result=>{
    if(result.committed){
      document.body.dataset.theme = theme.key;
      toast(`${theme.icon} ${theme.name} purchased and applied!`);
      activeTab='shop';
    } else {
      toast('Coins mathi alla or already owned');
    }
  });
}

function selectTheme(themeKey){
  const theme = THEME_SHOP.find(t=>t.key===themeKey);
  const staff = staffCache[currentUser?.id];
  if(!theme || !staff || !ownedThemeKeys(staff).includes(themeKey)) return;
  db.ref('todoQuest/staff/'+currentUser.id).update({activeTheme: themeKey, themeEnabled: true}).then(()=>{
    document.body.dataset.theme = theme.key;
    toast(`${theme.icon} ${theme.name} applied`);
    activeTab='shop';
  });
}

function buyStyle(styleKey){
  const style = STYLE_SHOP.find(s=>s.key===styleKey);
  if(!style || !currentUser || currentUser.isAdmin || style.cost===0) return;

    if((staff.coins||0) < style.cost) return;
    staff.coins = (staff.coins||0) - style.cost;
    staff.styles[style.key] = true;
    staff.activeStyle = style.key;
    return staff;
  }).then(result=>{
    if(result.committed){
      document.body.dataset.style = style.key;
      toast(`${style.icon} ${style.name} unlocked and applied!`);
      activeTab='shop';
    } else {
      toast('Coins mathi alla or already owned');
    }
  });
}

function selectStyle(styleKey){
  const style = STYLE_SHOP.find(s=>s.key===styleKey);

  if(!style || !staff || !ownedStyleKeys(staff).includes(styleKey)) return;

function toggleThemeMode(enabled){

    document.body.dataset.theme = enabled ? (staff.activeTheme || 'default') : 'default';

function editTask(taskId){
  const t = taskCache[taskId];
  if(!t || !currentUser || currentUser.isAdmin || t.staffId !== currentUser.id || t.status === 'completed') return;
  showModal(`
    <h3 style="margin-bottom:12px;">Edit Quest</h3>
    <label style="margin-top:0;">Quest Title</label>
    <input id="editTaskTitle" value="${escapeAttr(t.title)}" placeholder="Quest title">
    <label>Deadline</label>
    <input id="editTaskDeadline" type="datetime-local" value="${todayDateTimeInput(t.deadline || Date.now())}">
    <button class="btn btn-primary btn-block" style="margin-top:16px;" onclick="saveTaskEdit('${taskId}')">Save Quest</button>
  `);
}
function saveTaskEdit(taskId){
  const t = taskCache[taskId];
  if(!t || !currentUser || currentUser.isAdmin || t.staffId !== currentUser.id || t.status === 'completed') return;
  const title = document.getElementById('editTaskTitle').value.trim();
  const deadlineVal = document.getElementById('editTaskDeadline').value;
  if(!title){ toast('Quest title venam'); return; }
  db.ref('todoQuest/tasks/'+taskId).update({
    title,
    deadline: deadlineVal ? new Date(deadlineVal).getTime() : null,
    editedAt: Date.now()
  }).then(()=>{
    closeModal();
    toast('✅ Quest updated');
  });
}

function completeTask(taskId){
  const t = taskCache[taskId];
  const now = Date.now();
  const onTime = t.deadline ? now <= t.deadline : true;
  const updates = {
    status: 'completed',
    completedAt: now,
    onTime
  };
  db.ref('todoQuest/tasks/'+taskId).update(updates).then(()=>{
    const staffRef = db.ref('todoQuest/staff/'+t.staffId);
    staffRef.transaction(s=>{
      if(!s) return s;
      s.score = (s.score||0) + SCORE_PER_TASK;
      if(onTime){
        s.coins = (s.coins||0) + COINS_PER_TASK;
        s.onTimeCount = (s.onTimeCount||0) + 1;
      }
      return s;
    }).then(()=>{
      if(onTime){
        toast(`🎉 +${COINS_PER_TASK} coins & +${SCORE_PER_TASK} pts! Onnu kaanam →`);
      } else {
        toast(`✅ Task complete! +${SCORE_PER_TASK} pts — deadline kazhinjirunnu, coins illa`);
      }
      setTimeout(()=>document.getElementById('coinPill')?.classList.add('bump'), 100);
      setTimeout(()=>document.getElementById('scorePill')?.classList.add('bump'), 100);
    });
  });
}

        ${staffList.map(s=>{
          const tasks = myTasks(s.id);
          const pending = tasks.filter(t=>t.status!=='completed');

            <td>✨ ${s.score||0}</td>
            <td>🪙 ${s.coins||0}</td>
            <td>${renderThemeName(s)}</td>
            <td>${renderStyleName(s)}</td>
            <td>${renderCharms(s,true)}</td>

        }).join('')}

function renderAssignForm(staffList){

      <select id="assignStaffId">
        ${staffList.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}

      <label>Deadline</label>
      <input id="assignDeadline" type="datetime-local" value="${todayDateTimeInput()}">
      <button class="btn btn-primary btn-block" style="margin-top:18px;" onclick="assignTask()">Assign Quests</button>
    </div>
    </div>

function assignTask(){
  const staffId = document.getElementById('assignStaffId').value;
  const titles = parseQuestTitles(document.getElementById('assignTitle').value);
  const deadlineVal = document.getElementById('assignDeadline').value;
  if(!staffId || !titles.length || !deadlineVal){ toast('Player, quest title, deadline ellam venam'); return; }
  const deadline = new Date(deadlineVal).getTime();
  Promise.all(titles.map(title => db.ref('todoQuest/tasks').push().set({
    staffId, title, desc: '', deadline,
    source:'admin', status:'pending', createdAt: Date.now()
  }))).then(()=>{
    toast(`✅ ${titles.length} Quest${titles.length>1?'s':''} assigned`);
    document.getElementById('assignTitle').value='';
    document.getElementById('assignDeadline').value=todayDateTimeInput();
  });
}

function renderManageStaff(staffList){

function addStaff(){
  const name = document.getElementById('newStaffName').value.trim();
  let pin = document.getElementById('newStaffPin').value.trim();
  if(!name){ toast('Peru venam'); return; }
  if(!pin || pin.length!==4) pin='0000';
  db.ref('todoQuest/staff').push().set({name, pin, coins:0, score:0, onTimeCount:0, charms:{}, themes:{}, activeTheme:'', styles:{}, activeStyle:'clay', createdAt:Date.now()}).then(()=>{
    toast('✅ Staff added');
    document.getElementById('newStaffName').value='';
    document.getElementById('newStaffPin').value='';
  });
}
function removeStaff(id){
  if(confirm('Ee staff-ne remove cheyyano? (Task history angane thanne irikkum)')){
    db.ref('todoQuest/staff/'+id).remove();
  }
}

/* ============ BOOT ============ */
(function boot(){
  const saved = localStorage.getItem('bb_todoquest_config');
  if(saved){
    try{ initFirebase(JSON.parse(saved)); }
    catch(e){ initFirebase(DEFAULT_FIREBASE_CONFIG); }
  } else {
    initFirebase(DEFAULT_FIREBASE_CONFIG);
  }
})();
</script>
